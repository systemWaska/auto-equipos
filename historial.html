<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Hub — Historial</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="sidebar-overlay" onclick="closeMobile()"></div>
<aside id="sidebar">
  <div class="logo"><div class="logo-mark"><div class="logo-dot"></div> IT Hub</div><div class="logo-sub">Sistema de Gestión</div></div>
  <nav class="nav">
    <div class="nav-section">Principal</div>
    <a class="nav-item" href="dashboard.html"><span class="nav-icon">⬡</span><span class="nav-label">Dashboard</span></a>
    <div class="nav-section">Gestión</div>
    <a class="nav-item" href="equipos.html"><span class="nav-icon">💻</span><span class="nav-label">Equipos</span></a>
    <a class="nav-item" href="automations.html"><span class="nav-icon">⚡</span><span class="nav-label">Automatizaciones</span></a>
    <a class="nav-item active" href="historial.html"><span class="nav-icon">📋</span><span class="nav-label">Historial</span></a>
    <div class="nav-section">Sistema</div>
    <a class="nav-item" href="config.html"><span class="nav-icon">⊞</span><span class="nav-label">Configuración</span></a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="avatar" id="user-avatar">IT</div>
      <div style="flex:1;min-width:0"><div class="uname" id="sidebar-user">Admin</div><div class="uorg" id="sidebar-role">IT Hub</div></div>
      <button class="logout-btn" onclick="doLogout()">↩</button>
    </div>
  </div>
</aside>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <button id="menu-btn" onclick="toggleMobile()">☰</button>
      <div class="page-title">Historial de Cambios</div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost btn-sm" onclick="loadFromGS()">↓ Sincronizar</button>
      <button class="btn btn-ghost btn-sm" onclick="exportCSV()">⤓ Exportar</button>
    </div>
  </div>

  <div class="content">
    <div class="card">
      <div class="filters">
        <div class="search-box"><input class="search-inp" id="q-hist" placeholder="Buscar por código, usuario, campo..." oninput="render()"></div>
        <select class="sel" id="f-campo" onchange="render()">
          <option value="">Todos los campos</option>
          <option>Area</option><option>Usuario</option><option>Estado</option><option>Cargador</option>
          <option>Mouse</option><option>Teclado</option><option>Audifonos</option><option>Monitor</option>
          <option>Cooler</option><option>MousePad</option><option>SO</option>
        </select>
        <input class="search-inp" id="f-desde" type="date" style="min-width:130px;flex:0" onchange="render()" title="Desde">
        <input class="search-inp" id="f-hasta" type="date" style="min-width:130px;flex:0" onchange="render()" title="Hasta">
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Código</th><th>Área</th><th>Usuario Anterior</th><th>Usuario Nuevo</th>
              <th>Campo</th><th>Valor Anterior</th><th>Valor Nuevo</th>
              <th>Modificado por</th><th>Fecha</th><th>Motivo</th>
            </tr>
          </thead>
          <tbody id="tb-hist"></tbody>
        </table>
      </div>
      <div style="padding:10px 16px;border-top:1px solid var(--bd);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu)" id="hist-count"></div>
    </div>
  </div>
</div>

<div id="toasts"></div>
<script src="shared.js"></script>
<script src="historial.js"></script>
</body>
</html>
