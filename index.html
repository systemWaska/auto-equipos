<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Hub — Login</title>
<link rel="stylesheet" href="styles.css">
<style>
body{display:flex;align-items:center;justify-content:center;overflow:auto}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 50%,rgba(0,229,160,.04),transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(124,111,247,.04),transparent 60%);pointer-events:none}
.login-wrap{width:100%;max-width:400px;padding:20px;position:relative;z-index:1}
.login-box{background:var(--s1);border:1px solid var(--bd);border-radius:18px;padding:36px 32px;box-shadow:0 40px 80px rgba(0,0,0,.6)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo-mark{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--a);display:inline-flex;align-items:center;gap:10px}
.login-logo-dot{width:10px;height:10px;background:var(--a);border-radius:50%;box-shadow:0 0 14px var(--a);animation:pulse 2s infinite}
.login-logo-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu);letter-spacing:2px;text-transform:uppercase;margin-top:6px}
.login-title{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;margin-bottom:5px}
.login-desc{font-size:12.5px;color:var(--mu);margin-bottom:24px}
.login-field{margin-bottom:14px}
.login-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--mu);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;display:block}
.login-input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:11px 14px;color:var(--tx);font-size:13.5px;font-family:'IBM Plex Sans',sans-serif;outline:none;transition:all .2s}
.login-input:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(0,229,160,.07)}
.login-btn{width:100%;background:var(--a);color:var(--bg);border:none;border-radius:9px;padding:13px;font-size:14px;font-weight:700;font-family:'Syne',sans-serif;cursor:pointer;transition:all .2s;letter-spacing:.3px;margin-top:4px}
.login-btn:hover{background:#00ffb5;box-shadow:0 4px 24px rgba(0,229,160,.35);transform:translateY(-1px)}
.login-error{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.25);border-radius:7px;padding:9px 12px;font-size:12px;color:#ff6b6b;margin-bottom:13px;display:none}
.login-hint{text-align:center;margin-top:16px;font-size:11px;color:var(--mu)}
.login-hint code{background:var(--s2);padding:1px 5px;border-radius:4px;font-family:'IBM Plex Mono',monospace;color:var(--a)}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-mark"><div class="login-logo-dot"></div> IT Hub</div>
      <div class="login-logo-sub">Sistema de Gestión TI</div>
    </div>
    <div class="login-title">Acceso al sistema</div>
    <div class="login-desc">Ingresa tus credenciales de administrador</div>
    <div class="login-error" id="login-error"></div>
    <div class="login-field">
      <label class="login-label">Nombre</label>
      <input class="login-input" type="text" id="login-name" placeholder="Tu nombre completo" autocomplete="name">
    </div>
    <div class="login-field">
      <label class="login-label">Contraseña</label>
      <input class="login-input" type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" onclick="doLogin()">Ingresar →</button>
    <div class="login-hint">Contraseña por defecto: <code>admin123</code></div>
  </div>
</div>
<div id="toasts"></div>
<script>
if(sessionStorage.getItem('ithub_session'))window.location.href='dashboard.html';
function doLogin(){
  const name=document.getElementById('login-name').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-error');
  err.style.display='none';
  if(!name){err.textContent='Ingresa tu nombre.';err.style.display='block';return;}
  const stored=localStorage.getItem('pass_admin')||'admin123';
  if(pass!==stored){err.textContent='Contraseña incorrecta.';err.style.display='block';return;}
  sessionStorage.setItem('ithub_session',JSON.stringify({name,role:'admin',ts:Date.now()}));
  window.location.href='dashboard.html';
}
</script>
</body>
</html>
